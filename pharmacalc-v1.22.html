/* === ROTATING ACCESS CODE === */
var ACCESS_MASTER='SQUH4656';
var ACCESS_SECRET='PEDS-SQUH-2026';

function _accHash(s){
  var h=2166136261;
  for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h=(h*16777619)>>>0;}
  return h;
}
function getMonthlyCode(d){
  d=d||new Date();
  var ym=d.getFullYear()+'-'+(d.getMonth()+1);
  var n=_accHash(ACCESS_SECRET+'|'+ym)%10000;
  return 'SQ'+('0000'+n).slice(-4);
}
function isValidAccess(code){
  if(!code) return false;
  code=code.trim().toUpperCase();
  if(code===ACCESS_MASTER) return true;
  var now=new Date();
  if(code===getMonthlyCode(now)) return true;
  var prev=new Date(now.getFullYear(),now.getMonth()-1,1);
  if(code===getMonthlyCode(prev)) return true;
  return false;
}

/* Step 8: localStorage helpers (graceful fallback when storage unavailable) */
function _safeGet(key){
  try{return localStorage.getItem(key);}catch(e){return null;}
}
function _safeSet(key,val){
  try{localStorage.setItem(key,val);return true;}catch(e){return false;}
}
function loadStoredWeight(){
  var w=_safeGet('pedscalc.wt');
  if(w&&!isNaN(parseFloat(w))) return w;
  return '';
}
function storeWeight(w){
  if(w&&!isNaN(parseFloat(w))) _safeSet('pedscalc.wt',w);
}

/* v1.5: language + theme persistence */
function loadStoredLang(){var v=_safeGet('pedscalc.lang'); return (v==='ar'||v==='en')?v:'en';}
function storeLang(v){_safeSet('pedscalc.lang',v);}
function loadStoredTheme(){var v=_safeGet('pedscalc.theme'); return (v==='light'||v==='dark'||v==='auto')?v:'auto';}
function storeTheme(v){_safeSet('pedscalc.theme',v);}

/* v1.22: calc history (last 5 drug calculations, strict cap) */
function loadCalcHistory(){
  try{
    var raw=_safeGet('pedscalc.calcHistory');
    if(!raw) return [];
    var arr=JSON.parse(raw);
    return Array.isArray(arr)?arr.slice(0,5):[];
  }catch(e){return [];}
}
function saveCalcEntry(entry){
  /* entry: {drug, weight, route, concLabel, totStr, volStr, freq, ts} */
  try{
    var hist=loadCalcHistory();
    /* Strict 5: prepend new, drop oldest beyond 5 */
    hist.unshift(entry);
    if(hist.length>5) hist=hist.slice(0,5);
    _safeSet('pedscalc.calcHistory',JSON.stringify(hist));
  }catch(e){/* silently fail if storage unavailable */}
}
function clearCalcHistory(){
  try{_safeSet('pedscalc.calcHistory','[]');}catch(e){}
}
function formatRelTime(ts){
  /* ts is ISO string. Returns 'just now', '5 min ago', '2 hr ago', 'yesterday', '3 days ago' */
  if(!ts) return '';
  try{
    var then=new Date(ts).getTime();
    var now=Date.now();
    var diff=Math.max(0,Math.floor((now-then)/1000));
    if(diff<60) return 'just now';
    if(diff<3600) return Math.floor(diff/60)+' min ago';
    if(diff<86400) return Math.floor(diff/3600)+' hr ago';
    if(diff<172800) return 'yesterday';
    return Math.floor(diff/86400)+' days ago';
  }catch(e){return '';}
}

/* v1.5: apply theme override by toggling a class on <html> */
function applyTheme(t){
  var root=document.documentElement;
  root.classList.remove('theme-light','theme-dark');
  if(t==='light') root.classList.add('theme-light');
  else if(t==='dark') root.classList.add('theme-dark');
  /* 'auto' = no class, fall through to prefers-color-scheme */
}

function getCR(name,route){return(CONC_BY_ROUTE[name]&&CONC_BY_ROUTE[name][route])||null;}
function getWt(){return parseFloat(state.wtConfirmed)||0;}
function getRoutes(rs){
  if(rs.toLowerCase().indexOf('nebuliz')>=0) return['Nebulized'];
  var out=[];
  if(/\bPO\b/.test(rs)) out.push('PO');
  if(/\bIV\b/.test(rs)) out.push('IV');
  if(/\bIM\b/.test(rs)) out.push('IM');
  if(/\bSC\b/.test(rs)) out.push('SC');
  if(/\bPR\b/.test(rs)) out.push('PR');
  if(/buccal/i.test(rs)) out.push('Buccal');
  if(/\bIN\b/.test(rs)) out.push('IN');
  return out.length?out:[rs.split('(')[0].trim()];
}
function routeLabel(r){var m={PO:'Oral (PO)',IV:'IV',IM:'IM',SC:'SC',PR:'Rectal (PR)',Nebulized:'Nebulized',Buccal:'Buccal',IN:'Intranasal (IN)'};return m[r]||r;}
function routeText(r){var m={PO:'by mouth',IV:'intravenously',IM:'intramuscularly',SC:'subcutaneously',PR:'rectally',Nebulized:'by nebulisation',Buccal:'buccally',IN:'intranasally'};return m[r]||r;}
function defaultRoute(rs){var r=getRoutes(rs);for(var i=0;i<r.length;i++){if(r[i]==='PO') return 'PO';}return r[0];}

function resultHTML(){
  var d=state.drug;
  if(!d) return '';
  var wt=getWt();
  var conc=parseFloat(state.conc)||d.conc;
  var isSingle=d.lo===d.hi;
  var c=CC[d.cat]||{};
  var tMin=wt*d.lo, tMax=wt*d.hi;
  var cMin=Math.min(tMin,d.max), cMax=Math.min(tMax,d.max);
  var vMin=conc>0?cMin/conc:0, vMax=conc>0?cMax/conc:0;
  var isCapped=tMin>d.max||tMax>d.max;
  var doseStr=isSingle?(''+d.lo):(d.lo+'-'+d.hi);
  // v1.14: dynamic precision - more decimals for small mg doses (e.g. digoxin)
  var dPrecision=cMax<1?3:(cMax<10?2:1);
  var totStr=isSingle?cMin.toFixed(dPrecision):(cMin.toFixed(dPrecision)+'-'+cMax.toFixed(dPrecision));
  var volStr=isSingle?vMin.toFixed(2):(vMin.toFixed(2)+'-'+vMax.toFixed(2));
  /* v1.22: save to history (only on first render of this drug+weight+route, not on every re-render) */
  if(wt>0 && d.lo>0 && d.hi>0 && conc>0){
    var saveKey=d.name+'|'+wt+'|'+state.selectedRoute+'|'+state.conc;
    if(state._lastHistKey!==saveKey){
      state._lastHistKey=saveKey;
      saveCalcEntry({
        drug:d.name,
        cat:d.cat,
        weight:wt,
        route:state.selectedRoute,
        concLabel:state.concLabel||d.concL||'',
        conc:state.conc,
        totStr:totStr,
        volStr:volStr,
        freq:d.freq,
        ts:new Date().toISOString()
      });
    }
  }
  var routes=getRoutes(d.route);
  var tabs='';
  if(routes.length>1){
    tabs='<div class="route-tabs">';
    for(var i=0;i<routes.length;i++){
      var act=state.selectedRoute===routes[i]?' active':'';
      tabs+='<button class="rtab'+act+' route-tab-btn" data-route="'+routes[i]+'">'+routeLabel(routes[i])+'</button>';
    }
    tabs+='</div>';
  }
  var refsHtml='';
  if(state.showRefs){
    var rkeys=Object.keys(d.refs);
    for(var ri=0;ri<rkeys.length;ri++){
      var rk=rkeys[ri];
      var rv=d.refs[rk];
      refsHtml+='<div class="ref-block">'+
        '<div class="ref-top"><span class="ref-k">'+rk+'</span><span class="ref-dose">'+rv.dose+'</span></div>'+
        '<div class="ref-note">'+rv.note+'</div></div>';
    }
    refsHtml='<div style="margin-top:.85rem">'+refsHtml+'</div>';
  }
  var infoHtml='<div class="info-strip">'+
    (d.indication?('<div class="info-row"><span class="info-lbl">Indication</span><span>'+d.indication+'</span></div>'):'')+''+
    (d.moa?('<div class="info-row"><span class="info-lbl">Mechanism</span><span>'+d.moa+'</span></div>'):'')+''+
    (d.sideEffects?('<div class="info-row"><span class="info-lbl">Side effects</span><span>'+d.sideEffects+'</span></div>'):'')+''+
    '</div>';
  var calcHTML='';
  if(wt>0){
    if(d.lo===0&&d.hi===0){
      calcHTML='<div class="metric" style="margin-bottom:.75rem;background:#f5f5f5">'+
        '<div class="metric-l">Reference only</div>'+
        '<div style="font-size:14px;color:#666;line-height:1.6;margin-top:6px">This medication uses age-based or fixed-volume dosing rather than weight-based calculation. Refer to the dosing notes below.</div></div>';
    } else if(parseFloat(state.conc)===0){
      calcHTML='<div class="metric" style="margin-bottom:.75rem">'+
        '<div class="metric-l">Calculated dose</div>'+
        '<div class="metric-v">'+totStr+'<span class="metric-u">mg</span></div></div>'+
        '<div class="warn">Suppository - select the nearest available size to '+totStr+' mg. Do not cut suppositories.</div>';
    } else {
      var capWarn=isCapped?('<div class="err">Max dose cap applied - dose exceeds '+d.max+' mg.</div>'):'';
      /* v1.5: Arabic admin instruction */

function calcCrCl(){
  var wt=parseFloat(state.rWt)||0;
  var ht=parseFloat(state.rHt)||0;
  var age=parseFloat(state.rAge)||0;
  var scr=parseFloat(state.rScr)||0;
  var unit=state.rScrUnit;
  var eq=state.rEq;
  if(!scr||!ht) return null;
  var scrMgDl=unit==='umol'?scr/88.4:scr;
  var scrUmol=unit==='umol'?scr:scr*88.4;
  var crcl=0;
  var formula='';
  if(eq==='schwartz2009'){
    crcl=0.413*ht/scrMgDl;
    formula='0.413 x '+ht+' / '+scrMgDl.toFixed(3);
  } else if(eq==='schwartz1976'){
    var k=0.55; var kLabel='0.55';
    if(age<1){k=0.45;kLabel='0.45 (infant)';}
    else if(state.rSex==='male'&&age>=13){k=0.7;kLabel='0.7 (adolescent male)';}
    crcl=k*ht/scrMgDl;
    formula='k('+kLabel+') x '+ht+' / '+scrMgDl.toFixed(3);
  } else if(eq==='counahan'){
    crcl=0.43*ht/scrUmol;
    formula='0.43 x '+ht+' / '+scrUmol.toFixed(1);
  } else if(eq==='cg'){
    if(!wt||age<12) return {error:'Cockcroft-Gault requires age 12 years or over and weight.'};
    var raw=((140-age)*wt*(state.rSex==='female'?0.85:1))/(72*scrMgDl);
    var bsa=Math.sqrt(ht*wt/3600);
    crcl=raw*1.73/bsa;
    formula='[(140-'+age+') x '+wt+' x '+(state.rSex==='female'?'0.85':'1.0')+'] / (72 x '+scrMgDl.toFixed(3)+') normalised by BSA';
  }
  var stage=''; var stageColor='';
  if(crcl>=90){stage='G1 - Normal or high';stageColor='#085041';}
  else if(crcl>=60){stage='G2 - Mildly decreased';stageColor='#27500A';}
  else if(crcl>=45){stage='G3a - Mild-moderate decrease';stageColor='#633806';}
  else if(crcl>=30){stage='G3b - Moderate-severe decrease';stageColor='#7a5500';}
  else if(crcl>=15){stage='G4 - Severely decreased';stageColor='#791F1F';}
  else{stage='G5 - Kidney failure';stageColor='#8b1a1a';}
  return {crcl:crcl.toFixed(1),stage:stage,stageColor:stageColor,formula:formula};
}

    {key:'cg',label:'Cockcroft-Gault (1976)',short:'Adolescents 12 years and over only',formula:'[(140-age) x weight x 0.85(female)] / (72 x SCr) normalised by BSA',ref:'Cockcroft DW & Gault MH. Nephron 1976;16(1):31-41',note:'Applicable to adolescents 12 years and over only. Gives absolute CrCl normalised to 1.73m2 using Mosteller BSA formula. Less accurate in children under 12.'}
  ];

  }

/* === HOLLIDAY-SEGAR MAINTENANCE FLUIDS (v1.4 Step 2) === */
function calcFluids(){
  var wt=parseFloat(state.fWt)||0;
  if(wt<=0) return null;
  var temp=parseFloat(state.fTemp)||0;
  /* Holliday-Segar daily mL */
  var daily=0;
  if(wt<=10) daily=wt*100;
  else if(wt<=20) daily=1000+(wt-10)*50;
  else daily=1500+(wt-20)*20;
  var dailyBase=daily;
  /* Fever adjustment: +12% per degree C above 38 */
  var feverBonus=0;
  if(temp>38){
    var deg=temp-38;
    feverBonus=Math.round(daily*0.12*deg);
    daily=daily+feverBonus;
  }
  var hourly=daily/24;
  /* 4-2-1 hourly cross-check */
  var fortyOneHr=0;
  if(wt<=10) fortyOneHr=wt*4;
  else if(wt<=20) fortyOneHr=40+(wt-10)*2;
  else fortyOneHr=60+(wt-20)*1;
  return {
    dailyBase:Math.round(dailyBase),
    daily:Math.round(daily),
    feverBonus:feverBonus,
    hourly:hourly.toFixed(1),
    fortyOneHr:fortyOneHr,
    isNeonate:state.fNeo
  };
}

function calcBSA(){
  var wt=parseFloat(state.bWt)||0;
  var ht=parseFloat(state.bHt)||0;
  if(wt<=0||ht<=0) return null;
  var bsa=Math.sqrt((ht*wt)/3600);
  return {
    bsa:bsa.toFixed(2),
    bsaRaw:bsa,
    formula:'\u221a('+ht+' \u00d7 '+wt+' / 3600)'
  };
}

/* === FTU (Finger-Tip Unit) MODULE (v1.20) === */
/* Source: BNFC paediatric topical guidance. 1 FTU = 0.5 g of cream/ointment */
/* Notes: 'arm' value in FTU_TABLE is for ONE arm; we expose 'Both arms' as a separate site that doubles. Same for legs (already includes both). */
var FTU_TABLE={
  "3-6mo":{label:"3-6 months",face:1,hands:1,arm:1,legs:1.5,trunkF:1,trunkB:1.5},
  "1-2y":{label:"1-2 years",face:1.5,hands:1.5,arm:1.5,legs:2,trunkF:2,trunkB:3},
  "3-5y":{label:"3-5 years",face:1.5,hands:2,arm:2,legs:3,trunkF:3,trunkB:3.5},
  "6-10y":{label:"6-10 years",face:2,hands:2.5,arm:2.5,legs:4.5,trunkF:3.5,trunkB:5}
};
var FTU_AGE_BANDS=["3-6mo","1-2y","3-5y","6-10y"];
/* Each site references a key in FTU_TABLE plus a multiplier (for 'Both arms') */
var FTU_SITES=[
  {key:"face",mult:1,label:"Face & neck"},
  {key:"hands",mult:1,label:"Both hands"},
  {key:"oneArm",baseKey:"arm",mult:1,label:"One arm"},
  {key:"bothArms",baseKey:"arm",mult:2,label:"Both arms"},
  {key:"legs",mult:1,label:"Both legs & feet"},
  {key:"trunkF",mult:1,label:"Trunk (front)"},
  {key:"trunkB",mult:1,label:"Trunk (back)"}
];
var FTU_PRESETS=[
  {label:"Just face",sites:["face"]},
  {label:"Both arms",sites:["bothArms"]},
  {label:"Both legs",sites:["legs"]},
  {label:"Whole body",sites:["face","hands","bothArms","legs","trunkF","trunkB"]}
];
var FTU_TUBE_SIZES=[15,25,30,50,100]; /* SQUH stock sizes */

function calcFTU(){
  var ageKey=state.ftuAge;
  if(!ageKey||!FTU_TABLE[ageKey]) return null;
  var sites=state.ftuSites;
  var freq=state.ftuFreq;
  var days=parseInt(state.ftuDays)||0;
  if(days<=0) return null;
  /* Sum FTU for selected sites */
  var ftuTotal=0;
  var selectedLabels=[];
  var bandData=FTU_TABLE[ageKey];
  for(var i=0;i<FTU_SITES.length;i++){
    var s=FTU_SITES[i];
    if(sites[s.key]){
      var lookupKey=s.baseKey||s.key;
      var ftuValue=bandData[lookupKey]*s.mult;
      ftuTotal+=ftuValue;
      selectedLabels.push(s.label+" ("+ftuValue+" FTU)");
    }
  }
  if(ftuTotal===0) return null;
  var freqMap={"OD":1,"BD":2,"TDS":3};
  var freqMult=freqMap[freq]||2;
  var perApp=ftuTotal*0.5; /* 1 FTU = 0.5g */
  var perDay=perApp*freqMult;
  var courseTotal=perDay*days;
  var ftuCourse=Math.round(courseTotal/0.5);
  /* Pick smallest tube that fits, or if exceeds 100g say multi-tube */
  var tubeSize=null;
  for(var t=0;t<FTU_TUBE_SIZES.length;t++){
    if(FTU_TUBE_SIZES[t]>=courseTotal){tubeSize=FTU_TUBE_SIZES[t];break;}
  }
  return {
    ageBand:bandData.label,
    selectedLabels:selectedLabels,
    ftuTotal:ftuTotal,
    perApp:perApp,
    perDay:perDay,
    courseTotal:courseTotal,
    ftuCourse:ftuCourse,
    freq:freq,
    days:days,
    tubeSize:tubeSize,
    multiTube:tubeSize===null
  };
}

function calcInfusion(){
  var idx=parseInt(state.iDrug)||0;
  var d=INF_DRUGS[idx];
  if(!d) return null;
  var wt=parseFloat(state.iWt)||0;
  var rate=parseFloat(state.iRate)||0;
  var amt=parseFloat(state.iAmt)||d.stdAmt;
  var vol=parseFloat(state.iVol)||d.stdVol;
  if(wt<=0||rate<=0||amt<=0||vol<=0) return null;
  /* Convert amount to mcg if needed (mg \u2192 mcg). Units stay as units. */
  var amtMcg=amt;
  var amtUnit=state.iAmtUnit||d.stdAmtUnit;
  if(amtUnit==='mg') amtMcg=amt*1000;
  /* Concentration per mL */
  var concPerMl=amtMcg/vol;  /* mcg/mL OR units/mL */
  /* Convert dose rate to per-hour amount */
  var amtPerHour=0;
  if(d.unitMode==='mcg/kg/min'){
    amtPerHour=rate*wt*60;  /* mcg/h */
  } else if(d.unitMode==='mcg/kg/h'){
    amtPerHour=rate*wt;  /* mcg/h */
  } else if(d.unitMode==='mg/kg/h'){
    amtPerHour=rate*wt*1000;  /* mg/h \u2192 mcg/h */
  } else if(d.unitMode==='units/kg/h'){
    amtPerHour=rate*wt;  /* units/h */
  }
  /* mL/hr = (amt needed per hour) / (amt per mL) */
  var mlPerHr=amtPerHour/concPerMl;
  return {
    drugName:d.name,
    unitMode:d.unitMode,
    rate:rate,
    wt:wt,
    amt:amt,
    amtUnit:amtUnit,
    vol:vol,
    concLabel:d.stdLabel,
    mlPerHr:mlPerHr.toFixed(2),
    amtPerHour:amtPerHour,
    range:d.lo+' - '+d.hi+' '+d.unitMode,
    inRange:rate>=d.lo&&rate<=d.hi
  };
}

function lookupNeoDose(){
  var ga=parseFloat(state.nGA)||0;
  var pna=parseFloat(state.nPNA);
  if(isNaN(pna)) pna=-1;
  var idx=parseInt(state.nDrug)||0;
  var d=NEO_DRUGS[idx];
  if(!d||ga<=0||pna<0) return null;
  for(var i=0;i<d.doses.length;i++){
    var x=d.doses[i];
    if(ga>=x.gaMin&&ga<=x.gaMax&&pna>=x.pnaMin&&pna<=x.pnaMax){
      return {drug:d,match:x,ga:ga,pna:pna};
    }
  }
  return {drug:d,match:null,ga:ga,pna:pna};
}

function neonatalHTML(){
  var idx=parseInt(state.nDrug)||0;
  var d=NEO_DRUGS[idx];
  var res=state.nResult;
  var drugOpts='';
  for(var i=0;i<NEO_DRUGS.length;i++){
    drugOpts+='<option value="'+i+'"'+(i===idx?' selected':'')+'>'+NEO_DRUGS[i].name+'</option>';
  }
  /* GA classification */
  var gaTxt='';
  var gaNum=parseFloat(state.nGA)||0;
  if(gaNum>0){
    if(gaNum<28) gaTxt='Extremely preterm';
    else if(gaNum<32) gaTxt='Very preterm';
    else if(gaNum<37) gaTxt='Preterm';
    else if(gaNum<42) gaTxt='Term';
    else gaTxt='Post-term';
  }
  var resultBox='';
  if(res){
    if(!res.match){
      resultBox='<div class="err">No matching dose entry for GA '+res.ga+' weeks and PNA '+res.pna+' days. Check Neofax / NICU protocol directly.</div>';
    } else {

  return '<div>'+

  '<button class="ref-btn" id="btn-back-neo" style="color:#185FA5;font-size:13px;font-weight:600;margin-bottom:.5rem">&#8592; Back</button>'+

function bindEvents(){
  var s=state.screen;
  var el;
  if(s==='access'){
    el=document.getElementById('inp-access');
    if(el) el.addEventListener('keydown',function(e){if(e.key==='Enter')checkAccess();});
    el=document.getElementById('btn-access');
    if(el) el.addEventListener('click',function(){checkAccess();});
  } else if(s==='splash'){
    el=document.getElementById('btn-start');
    if(el) el.addEventListener('click',function(){state.screen='disclaimer';render();});
  } else if(s==='disclaimer'){
    el=document.getElementById('btn-disc');
    if(el) el.addEventListener('click',function(){state.screen='modules';render();});
  } else if(s==='home'){
    el=document.getElementById('inp-wt');
    if(el){
      el.addEventListener('input',function(e){state.wt=e.target.value;});
      el.addEventListener('keydown',function(e){if(e.key==='Enter'){confirmWt();render();}});
    }
    el=document.getElementById('inp-age');
    if(el) el.addEventListener('input',function(e){state.age=e.target.value;});
    el=document.getElementById('inp-search');
    if(el) el.addEventListener('input',function(e){
      state.search=e.target.value;
      if(e.target.value.length>2) trackEvent('Search','drug_search',e.target.value);
      /* v1.17: redirect to All Drugs screen with search term carried over */
      if(e.target.value.length>0){
        state.screen='allDrugs';
        render();
      }
    });
    el=document.getElementById('inp-cat');
    if(el) el.addEventListener('change',function(e){
      state.cat=e.target.value;
      /* v1.17: redirect to All Drugs unless user picked 'All' */
      if(e.target.value!=='All'){
        state.screen='allDrugs';
      }
      render();

    el=document.getElementById('btn-home-back');
    if(el) el.addEventListener('click',function(){state.screen='modules';render();});
    /* v1.16: stat tile handlers */
    el=document.getElementById('btn-stat-drugs');
    if(el) el.addEventListener('click',function(){state.screen='allDrugs';render();});
    el=document.getElementById('btn-stat-cats');
    if(el) el.addEventListener('click',function(){state.screen='allCats';render();});
    el=document.getElementById('btn-stat-refs');
    if(el) el.addEventListener('click',function(){state.screen='allRefs';render();});
  } else if(s==='allDrugs'){
    el=document.getElementById('btn-back-allDrugs');
    if(el) el.addEventListener('click',function(){state.screen='home';render();});
    /* v1.17: search input on All Drugs */
    el=document.getElementById('inp-search-all');
    if(el){
      el.addEventListener('input',function(e){
        state.search=e.target.value;
        if(e.target.value.length>2) trackEvent('Search','allDrugs_search',e.target.value);
        render();
        /* preserve focus + cursor position after re-render */
        var ne=document.getElementById('inp-search-all');
        if(ne){ne.focus();var v=ne.value;ne.setSelectionRange(v.length,v.length);}
      });
      /* auto-focus on entry, but don't steal focus on every render */
      if(state.search==='') el.focus();
    }
    el=document.getElementById('btn-clear-allDrugs');
    if(el) el.addEventListener('click',function(){
      state.search='';state.cat='All';render();
    });
    var allRows=document.querySelectorAll('.drow');
    for(var ad=0;ad<allRows.length;ad++){
      (function(row){row.addEventListener('click',function(){
        var d=DRUGS[parseInt(row.dataset.idx)];
        var dr=defaultRoute(d.route);
        var cr=getCR(d.name,dr);
        state.drug=d;state.selectedRoute=dr;
        state.conc=String(cr?cr.c:d.conc);
        state.concLabel=cr?cr.l:'';
        state.showRefs=false;state.screen='result';
        trackEvent('Drug','select_from_all',d.name);
        render();
      });})(allRows[ad]);
    }
  } else if(s==='allCats'){
    el=document.getElementById('btn-back-allCats');
    if(el) el.addEventListener('click',function(){state.screen='home';render();});
    var catCards=document.querySelectorAll('.cat-card-btn');
    for(var cc=0;cc<catCards.length;cc++){
      (function(btn){btn.addEventListener('click',function(){
        state.cat=btn.dataset.cat;
        state.showDrugList=true;
        state.screen='home';
        render();
      });})(catCards[cc]);
    }
  } else if(s==='allRefs'){
    el=document.getElementById('btn-back-allRefs');
    if(el) el.addEventListener('click',function(){state.screen='home';render();});
  } else if(s==='changelog'){
    el=document.getElementById('btn-back-changelog');
    if(el) el.addEventListener('click',function(){state.screen='settings';render();});
  } else if(s==='result'){
    el=document.getElementById('btn-back');
    if(el) el.addEventListener('click',function(){state.screen='home';render();});
    el=document.getElementById('inp-wt-res');
    if(el) el.addEventListener('input',function(e){state.wt=e.target.value;});
    el=document.getElementById('btn-calc');
    if(el) el.addEventListener('click',function(){confirmWtRes();});
    el=document.getElementById('inp-wt-res');
    if(el) el.addEventListener('keydown',function(e){if(e.key==='Enter')confirmWtRes();});
    el=document.getElementById('inp-conc');
    if(el) el.addEventListener('input',function(e){state.conc=e.target.value;render();});
    el=document.getElementById('btn-refs');
    if(el) el.addEventListener('click',function(){state.showRefs=!state.showRefs;render();});
    var rtabs=document.querySelectorAll('.route-tab-btn');
    for(var ri=0;ri<rtabs.length;ri++){
      (function(btn){btn.addEventListener('click',function(){
        var nr=btn.dataset.route;
        var cr=getCR(state.drug.name,nr);
        state.selectedRoute=nr;
        state.conc=String(cr?cr.c:state.drug.conc);
        state.concLabel=cr?cr.l:'';
        trackEvent('Route','switch',state.drug.name+' - '+nr);
        render();
      });})(rtabs[ri]);
    }
    el=document.getElementById('btn-go-feedback-res');
    if(el) el.addEventListener('click',function(){
      state.fbType='error';
      state.fbDrug=state.drug?state.drug.name:'';
      state.fbMsg='';state.fbSent=false;state.screen='feedback';render();
    });
  } else if(s==='renal'){
    el=document.getElementById('btn-back-renal');
    if(el) el.addEventListener('click',function(){state.screen='home';render();});
    el=document.getElementById('r-wt');
    if(el) el.addEventListener('input',function(e){state.rWt=e.target.value;});
    el=document.getElementById('r-ht');
    if(el) el.addEventListener('input',function(e){state.rHt=e.target.value;});
    el=document.getElementById('r-age');
    if(el) el.addEventListener('input',function(e){state.rAge=e.target.value;});
    el=document.getElementById('r-sex');
    if(el) el.addEventListener('change',function(e){state.rSex=e.target.value;});
    el=document.getElementById('r-scr');
    if(el) el.addEventListener('input',function(e){state.rScr=e.target.value;});
    el=document.getElementById('r-scr-unit');
    if(el) el.addEventListener('change',function(e){
      /* Step 8: convert SCr instead of clearing it */
      var oldUnit=state.rScrUnit;
      var newUnit=e.target.value;
      var cur=parseFloat(state.rScr);
      if(!isNaN(cur)&&cur>0&&oldUnit!==newUnit){
        if(oldUnit==='umol'&&newUnit==='mgdl') state.rScr=(cur/88.4).toFixed(2);
        else if(oldUnit==='mgdl'&&newUnit==='umol') state.rScr=(cur*88.4).toFixed(0);
      }
      state.rScrUnit=newUnit;
      render();
    });
    var eqCards=document.querySelectorAll('.eq-card');
    for(var ei=0;ei<eqCards.length;ei++){
      (function(card){card.addEventListener('click',function(){state.rEq=card.dataset.eq;render();});})(eqCards[ei]);
    }
    el=document.getElementById('btn-calc-renal');
    if(el) el.addEventListener('click',function(){
      var wtEl=document.getElementById('r-wt');
      var htEl=document.getElementById('r-ht');
      var ageEl=document.getElementById('r-age');
      var sexEl=document.getElementById('r-sex');
      var scrEl=document.getElementById('r-scr');
      if(wtEl) state.rWt=wtEl.value;
      if(htEl) state.rHt=htEl.value;
      if(ageEl) state.rAge=ageEl.value;
      if(sexEl) state.rSex=sexEl.value;
      if(scrEl) state.rScr=scrEl.value;
      state.rResult=calcCrCl();
      render();
    });
  } else if(s==='fluids'){
    el=document.getElementById('btn-back-fluids');
    if(el) el.addEventListener('click',function(){state.screen='home';render();});
    el=document.getElementById('f-wt');
    if(el) el.addEventListener('input',function(e){state.fWt=e.target.value;});
    el=document.getElementById('f-temp');
    if(el) el.addEventListener('input',function(e){state.fTemp=e.target.value;});
    el=document.getElementById('f-neo');
    if(el) el.addEventListener('change',function(e){state.fNeo=e.target.checked;});
    el=document.getElementById('btn-calc-fluids');
    if(el) el.addEventListener('click',function(){
      var w=document.getElementById('f-wt'); if(w) state.fWt=w.value;
      var t=document.getElementById('f-temp'); if(t) state.fTemp=t.value;
      var n=document.getElementById('f-neo'); if(n) state.fNeo=n.checked;
      state.fResult=calcFluids();
      trackEvent('Fluids','calculate',state.fWt+'kg');
      render();
    });
  } else if(s==='bsa'){
    el=document.getElementById('btn-back-bsa');
    if(el) el.addEventListener('click',function(){state.screen='home';render();});
    el=document.getElementById('b-wt');
    if(el) el.addEventListener('input',function(e){state.bWt=e.target.value;});
    el=document.getElementById('b-ht');
    if(el) el.addEventListener('input',function(e){state.bHt=e.target.value;});
    el=document.getElementById('btn-calc-bsa');
    if(el) el.addEventListener('click',function(){
      var w=document.getElementById('b-wt'); if(w) state.bWt=w.value;
      var h=document.getElementById('b-ht'); if(h) state.bHt=h.value;
      state.bResult=calcBSA();
      trackEvent('BSA','calculate',state.bWt+'kg/'+state.bHt+'cm');
      render();
    });
  } else if(s==='ivpo'){
    el=document.getElementById('btn-back-ivpo');
    if(el) el.addEventListener('click',function(){state.screen='home';render();});
  } else if(s==='infusion'){
    el=document.getElementById('btn-back-inf');
    if(el) el.addEventListener('click',function(){state.screen='home';render();});
    el=document.getElementById('i-drug');
    if(el) el.addEventListener('change',function(e){
      state.iDrug=parseInt(e.target.value)||0;
      state.iRate='';state.iAmt='';state.iVol='';state.iResult=null;
      render();
    });
    el=document.getElementById('i-wt');
    if(el) el.addEventListener('input',function(e){state.iWt=e.target.value;});
    el=document.getElementById('i-rate');
    if(el) el.addEventListener('input',function(e){state.iRate=e.target.value;});
    el=document.getElementById('i-amt');
    if(el) el.addEventListener('input',function(e){state.iAmt=e.target.value;});
    el=document.getElementById('i-vol');
    if(el) el.addEventListener('input',function(e){state.iVol=e.target.value;});
    el=document.getElementById('btn-calc-inf');
    if(el) el.addEventListener('click',function(){
      var ids=['i-wt','i-rate','i-amt','i-vol'];
      var keys=['iWt','iRate','iAmt','iVol'];
      for(var k=0;k<ids.length;k++){var x=document.getElementById(ids[k]); if(x) state[keys[k]]=x.value;}
      var d=INF_DRUGS[parseInt(state.iDrug)||0];
      state.iAmtUnit=d.stdAmtUnit;
      state.iResult=calcInfusion();
      trackEvent('Infusion','calculate',d.name);
      render();
    });
  } else if(s==='neonatal'){
    el=document.getElementById('btn-back-neo');
    if(el) el.addEventListener('click',function(){state.screen='home';render();});
    el=document.getElementById('n-ga');
    if(el) el.addEventListener('input',function(e){state.nGA=e.target.value;render();});
    el=document.getElementById('n-pna');
    if(el) el.addEventListener('input',function(e){state.nPNA=e.target.value;});
    el=document.getElementById('n-wt');
    if(el) el.addEventListener('input',function(e){state.nWt=e.target.value;});
    el=document.getElementById('n-drug');
    if(el) el.addEventListener('change',function(e){
      state.nDrug=parseInt(e.target.value)||0;
      state.nResult=null;
      render();
    });
    el=document.getElementById('btn-calc-neo');
    if(el) el.addEventListener('click',function(){
      var ids=['n-ga','n-pna','n-wt'];
      var keys=['nGA','nPNA','nWt'];
      for(var k=0;k<ids.length;k++){var x=document.getElementById(ids[k]); if(x) state[keys[k]]=x.value;}
      state.nResult=lookupNeoDose();
      var d=NEO_DRUGS[parseInt(state.nDrug)||0];
      trackEvent('Neonatal','lookup',d.name+' GA'+state.nGA+'/PNA'+state.nPNA);
      render();
    });
  } else if(s==='ftu'){
    el=document.getElementById('btn-back-ftu');
    if(el) el.addEventListener('click',function(){state.screen='home';render();});
    /* Age band buttons */
    var ageBtns=document.querySelectorAll('.ftu-age-btn');
    for(var fa=0;fa<ageBtns.length;fa++){
      (function(btn){btn.addEventListener('click',function(){
        state.ftuAge=btn.dataset.age;
        state.ftuResult=null;
        render();
      });})(ageBtns[fa]);
    }
    /* Site checkboxes */
    var siteCbs=document.querySelectorAll('.ftu-site-cb');
    for(var fs=0;fs<siteCbs.length;fs++){
      (function(cb){cb.addEventListener('change',function(){
        state.ftuSites[cb.dataset.site]=cb.checked;
        state.ftuResult=null;
        render();
      });})(siteCbs[fs]);
    }
    /* Preset buttons */
    var presetBtns=document.querySelectorAll('.ftu-preset-btn');
    for(var fp=0;fp<presetBtns.length;fp++){
      (function(btn){btn.addEventListener('click',function(){
        var p=FTU_PRESETS[parseInt(btn.dataset.preset)];
        /* Reset all sites first */
        for(var k in state.ftuSites){state.ftuSites[k]=false;}
        /* Then set preset sites */
        for(var x=0;x<p.sites.length;x++){state.ftuSites[p.sites[x]]=true;}
        state.ftuResult=null;
        render();
      });})(presetBtns[fp]);
    }
    /* Clear button */
    el=document.getElementById('btn-ftu-clear');
    if(el) el.addEventListener('click',function(){
      for(var k in state.ftuSites){state.ftuSites[k]=false;}
      state.ftuResult=null;
      render();
    });
    /* Frequency buttons */
    var freqBtns=document.querySelectorAll('.ftu-freq-btn');
    for(var ff=0;ff<freqBtns.length;ff++){
      (function(btn){btn.addEventListener('click',function(){
        state.ftuFreq=btn.dataset.freq;
        state.ftuResult=null;
        render();
      });})(freqBtns[ff]);
    }
    /* Days input */
    el=document.getElementById('inp-ftu-days');
    if(el) el.addEventListener('input',function(e){
      state.ftuDays=e.target.value;
      state.ftuResult=null;
    });
    /* Calculate button */
    el=document.getElementById('btn-calc-ftu');
    if(el&&!el.disabled) el.addEventListener('click',function(){
      var d=document.getElementById('inp-ftu-days');
      if(d) state.ftuDays=d.value;
      state.ftuResult=calcFTU();
      if(state.ftuResult){
        trackEvent('FTU','calc',state.ftuAge+'/'+state.ftuFreq+'/'+state.ftuDays+'d');
      }
      render();
    });
  } else if(s==='history'){
    el=document.getElementById('btn-back-history');
    if(el) el.addEventListener('click',function(){state.histClearConfirm=false;state.screen='home';render();});
    /* Row taps - re-open the drug */
    var histRows=document.querySelectorAll('.hist-row');
    var histData=loadCalcHistory();
    for(var hi=0;hi<histRows.length;hi++){
      (function(row){row.addEventListener('click',function(){
        var entry=histData[parseInt(row.dataset.idx)];
        if(!entry) return;
        /* Find drug by name in DRUGS array */
        var found=null;
        for(var j=0;j<DRUGS.length;j++){
          if(DRUGS[j].name===entry.drug){found=DRUGS[j];break;}
        }
        if(!found){
          /* Drug no longer exists in DRUGS list - silently fail */
          return;
        }
        /* Restore state for the drug */
        state.drug=found;
        state.wt=String(entry.weight);
        state.wtConfirmed=String(entry.weight);
        state.selectedRoute=entry.route||defaultRoute(found.route);
        state.conc=entry.conc||String(found.conc);
        state.concLabel=entry.concLabel||'';
        state.showRefs=false;
        state.screen='result';
        /* Reset the dedupe key so the entry refreshes its timestamp on re-render */
        state._lastHistKey=null;
        trackEvent('History','reopen',entry.drug);
        render();
      });})(histRows[hi]);
    }
    /* Clear flow */
    el=document.getElementById('btn-hist-clear');
    if(el) el.addEventListener('click',function(){state.histClearConfirm=true;render();});
    el=document.getElementById('btn-hist-clear-cancel');
    if(el) el.addEventListener('click',function(){state.histClearConfirm=false;render();});
    el=document.getElementById('btn-hist-clear-confirm');
    if(el) el.addEventListener('click',function(){
      clearCalcHistory();
      state.histClearConfirm=false;
      trackEvent('History','clear','');
      render();
    });
  } else if(s==='modules'){
    el=document.getElementById('btn-mod-peds');
    if(el) el.addEventListener('click',function(){state.screen='home';trackEvent('Module','select','pediatric');render();});
    el=document.getElementById('btn-go-settings-mod');
    if(el) el.addEventListener('click',function(){state.screen='settings';render();});
  } else if(s==='settings'){
    el=document.getElementById('btn-back-settings');
    if(el) el.addEventListener('click',function(){state.screen='home';render();});
    /* v1.16: changelog button */
    el=document.getElementById('btn-view-changelog');
    if(el) el.addEventListener('click',function(){state.screen='changelog';render();});
    var langBtns=document.querySelectorAll('[data-lang]');
    for(var li=0;li<langBtns.length;li++){
      (function(btn){btn.addEventListener('click',function(){
        state.lang=btn.dataset.lang;
        storeLang(state.lang);
        trackEvent('Settings','language',state.lang);
        render();
      });})(langBtns[li]);
    }
    var themeBtns=document.querySelectorAll('[data-theme]');
    for(var ti=0;ti<themeBtns.length;ti++){
      (function(btn){btn.addEventListener('click',function(){
        state.theme=btn.dataset.theme;
        storeTheme(state.theme);
        applyTheme(state.theme);
        trackEvent('Settings','theme',state.theme);
        render();
      });})(themeBtns[ti]);
    }
    /* v1.7: install button */
    el=document.getElementById('btn-pwa-install');
    if(el) el.addEventListener('click',function(){
      if(window.deferredPrompt){
        window.deferredPrompt.prompt();
        window.deferredPrompt.userChoice.then(function(choice){
          trackEvent('PWA','install_'+(choice.outcome||'unknown'),'');
          window.deferredPrompt=null;
          render();
        });
      }
    });
  } else if(s==='feedback'){
    el=document.getElementById('btn-back-fb');
    if(el) el.addEventListener('click',function(){state.fbSent=false;state.screen='home';render();});
    el=document.getElementById('btn-back-fb2');
    if(el) el.addEventListener('click',function(){state.fbSent=false;state.screen='home';render();});
    var fbtbs=document.querySelectorAll('.fbtb-btn');
    for(var fi=0;fi<fbtbs.length;fi++){
      (function(btn){btn.addEventListener('click',function(){state.fbType=btn.dataset.type;state.fbMsg='';render();});})(fbtbs[fi]);
    }
    el=document.getElementById('fb-drug');
    if(el) el.addEventListener('change',function(e){state.fbDrug=e.target.value;});
    el=document.getElementById('fb-msg');
    if(el) el.addEventListener('input',function(e){state.fbMsg=e.target.value;});
    el=document.getElementById('btn-fb-send');
    if(el) el.addEventListener('click',function(){
      var msgEl=document.getElementById('fb-msg');
      var msg=msgEl?msgEl.value:'';
      if(!msg.trim()){alert('Please enter your feedback before sending.');return;}
      var drugEl=document.getElementById('fb-drug');
      var drug=drugEl?drugEl.value:'';
      var typeLabel=state.fbType==='error'?'Drug Error Report':state.fbType==='missing'?'Missing Drug Request':'General Suggestion';
      var drugLine=drug?('Drug: '+drug+'\n'):'';
      var body=encodeURIComponent('PharmaCalc Feedback\nType: '+typeLabel+'\n'+drugLine+'\n'+msg+'\n\n- Sent from PharmaCalc v1.22');
      var subject=encodeURIComponent('PharmaCalc - '+typeLabel);
      window.location.href='mailto:rassadi222@gmail.com?subject='+subject+'&body='+body;
      trackEvent('Feedback','submit',state.fbType);
      state.fbSent=true;render();
    });
  }
}

(function(){
  /* Light deterrent only - cannot truly prevent a determined user from inspecting */
  document.addEventListener('contextmenu',function(e){e.preventDefault();});
  document.addEventListener('keydown',function(e){
    if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(['I','J','C','K'].indexOf(e.key.toUpperCase())>=0))||(e.metaKey&&e.altKey&&(['I','J','C'].indexOf(e.key.toUpperCase())>=0))||(e.ctrlKey&&e.key.toUpperCase()==='U'))e.preventDefault();
  });
})();

render();

/* === PWA wiring (v1.7) === */
(function(){
  /* Service worker registration */
  if('serviceWorker' in navigator){
    window.addEventListener('load',function(){
      navigator.serviceWorker.register('sw.js').then(function(reg){
        /* console.log('SW registered',reg.scope); */
      }).catch(function(err){
        /* console.warn('SW registration failed',err); */
      });
    });
  }
  /* Capture beforeinstallprompt for the in-app Install button */
  window.deferredPrompt=null;
  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();
    window.deferredPrompt=e;
    /* If user is currently on Settings, re-render so the button appears */
    if(typeof state!=='undefined'&&state.screen==='settings'&&typeof render==='function') render();
  });
  window.addEventListener('appinstalled',function(){
    window.deferredPrompt=null;
    if(typeof state!=='undefined'&&state.screen==='settings'&&typeof render==='function') render();
  });
})();

window.onerror=function(msg,src,line){document.getElementById('app').innerHTML='<div style="padding:2rem;font-family:monospace;font-size:13px;color:#c00"><strong>Error line '+line+':</strong><br>'+msg+'</div>';return true;};
